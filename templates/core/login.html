{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center mx-auto mb-4 text-xl shadow-md">
                <i class="fa-solid fa-flask"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Selamat Datang Kembali</h1>
            <p class="text-xs text-slate-500 mt-2">Masuk ke akun PARMADTIC Anda</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="bg-red-50 text-red-500 text-xs font-bold p-3 rounded-xl border border-red-100 text-center">
                Username atau password salah.
            </div>
            {% endif %}

            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Username</label>
                <input type="text" name="username" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Password</label>
                <input type="password" name="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition shadow-md mt-4">
                Masuk
            </button>
        </form>

        <p class="text-center text-xs text-slate-500 font-medium mt-6">
            Belum punya akun? <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline">Daftar sekarang</a>
        </p>
    </div>
</div>
{% endblock %}
